<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#00d9ff"/>
      <stop offset="100%" style="stop-color:#00ff88"/>
    </linearGradient>
  </defs>
  <rect width="192" height="192" fill="url(#bg)" rx="24"/>
  <g transform="translate(96, 96)">
    <!-- Microphone icon -->
    <rect x="-12" y="-20" width="24" height="40" rx="12" fill="url(#wave)"/>
    <path d="M -30 10 Q -30 40 0 40 Q 30 40 30 10" stroke="url(#wave)" stroke-width="8" fill="none" stroke-linecap="round"/>
    <line x1="0" y1="40" x2="0" y2="55" stroke="url(#wave)" stroke-width="8" stroke-linecap="round"/>
    <line x1="-15" y1="55" x2="15" y2="55" stroke="url(#wave)" stroke-width="8" stroke-linecap="round"/>
    <!-- Sound waves -->
    <path d="M -50 -10 Q -60 0 -50 10" stroke="url(#wave)" stroke-width="4" fill="none" opacity="0.6"/>
    <path d="M 50 -10 Q 60 0 50 10" stroke="url(#wave)" stroke-width="4" fill="none" opacity="0.6"/>
  </g>
</svg>
